<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Mr Vinoth ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #700000; 
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* Background Pulse Animation */
        .pulse-bg {
            animation: bgPulse 3s infinite ease-in-out;
        }
        @keyframes bgPulse {
            0%, 100% { background: #600000; }
            50% { background: #a01020; }
        }

        .top-header {
            position: fixed;
            top: 20px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .card-container {
            position: relative;
            width: 300px;
            height: 400px;
            border-radius: 15px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            background: white;
            border: 8px solid white;
            z-index: 10;
        }

        .lyrics-on-card {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        #lyric-text {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 0 15px;
        }

        .photo-under {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            background-image: url('IMG-20251118-WA0017.jpg'); /* Ensure this file is in the same folder */
        }

        #scratch-canvas {
            position: absolute;
            top: 0; left: 0;
            cursor: crosshair;
            touch-action: none;
            border-radius: 8px;
            z-index: 20;
        }

        /* SURPRISE LETTER */
        #letter-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(8px);
        }

        .letter-content {
            background: #fffafa;
            padding: 30px;
            width: 85%;
            max-width: 350px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid #ff4d6d;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter-content.open { transform: scale(1); }

        .reveal-btn {
            margin-top: 25px;
            padding: 15px 30px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            z-index: 150;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .heart-particle {
            position: fixed;
            bottom: -20px;
            font-size: 20px;
            pointer-events: none;
            z-index: 0;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp { to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }

        .controls-container {
            margin-top: 30px;
            z-index: 30;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 50px;
        }

        @media (max-width: 768px) {
            .card-container { width: 280px; height: 380px; }
        }
    </style>
</head>
<body>

    <div class="top-header"> For Mine ❤️</div>

    <div class="card-container" id="main-card">
        <div class="lyrics-on-card">
            <div id="lyric-text"></div>
        </div>
        <div class="photo-under"></div>
        <canvas id="scratch-canvas" width="300" height="400"></canvas>
    </div>

    <button id="final-btn" class="reveal-btn" onclick="openLetter()">Open Your Message 💌</button>

    <div id="letter-overlay" onclick="closeLetter()">
        <div class="letter-content" id="letter-box">
            <h2 style="color: #ff4d6d;">Dear Vinoth,</h2>
            <p style="font-size: 1.1rem; color: #333;">
                Every scratch reveals a memory, and every lyric reminds me of you. <br><br>
                Thank you for being my constant. You are truly special! 💖
            </p>
            <p style="font-size: 1.8rem;">🌹♾️🌹</p>
            <p style="color: #888; font-size: 0.8rem;">(Tap anywhere to close)</p>
        </div>
    </div>

    <div class="controls-container">
        <audio id="bg-music" controls>
            <source src="Vizhigalil Oru Vaanavil - Tamil Song.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const lyricDisplay = document.getElementById('lyric-text');
        const music = document.getElementById('bg-music');
        const finalBtn = document.getElementById('final-btn');
        let isFinished = false;

        const lyrics = [
            { time: 0.5, text: "நீ வந்தாய் என் வாழ்விலே...🩷" },
            { time: 5.0, text: "பூ பூத்தாய் என் வேரிலே...🌹" },
            { time: 10.0, text: "நாளையே நீ போகலாம்...🖤" },
            { time: 14.0, text: "என் ஞாபகம் நீயாகலாம்...💗" },
            { time: 18.0, text: "நீ சென்ற பின்னாலே வீதி என்னாகுமோ?" },
            { time: 25.0, text: "யாரவன் யாரவன் ஓர் மாயவன்...✨" },
            { time: 29.5, text: "மெய்யானவன் அன்பில் ❤️" }
        ];

        // START PULSE & LYRICS ON PLAY
        music.onplay = () => {
            document.body.classList.add('pulse-bg');
            lyricDisplay.style.opacity = 1;
        };
        music.onpause = () => {
            document.body.classList.remove('pulse-bg');
        };

        // SYNC LYRICS
        music.ontimeupdate = () => {
            const current = music.currentTime;
            const activeLyric = lyrics.filter(l => current >= l.time).pop();
            if (activeLyric && lyricDisplay.innerText !== activeLyric.text) {
                lyricDisplay.style.opacity = 0;
                setTimeout(() => {
                    lyricDisplay.innerText = activeLyric.text;
                    if (!music.paused) lyricDisplay.style.opacity = 1;
                }, 300);
            }
        };

        // SCRATCH SETUP
        ctx.fillStyle = '#C0C0C0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#555'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
        ctx.fillText('SCRATCH TO REVEAL 💎', 150, 200);

        function scratch(x, y) {
            if (isFinished) return;
            const rect = canvas.getBoundingClientRect();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x - rect.left, y - rect.top, 30, 0, Math.PI * 2); 
            ctx.fill();
            checkReveal();
        }

        function checkReveal() {
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let transparency = 0;
            for (let i = 3; i < data.length; i += 4) { if (data[i] === 0) transparency++; }
            if (transparency / (canvas.width * canvas.height) > 0.45 && !isFinished) {
                isFinished = true;
                canvas.style.transition = 'opacity 1s';
                canvas.style.opacity = '0';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => { 
                    canvas.remove();
                    finalBtn.style.display = 'block';
                }, 1000);
            }
        }

        // EVENT LISTENERS
        canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) scratch(e.clientX, e.clientY); });
        canvas.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            scratch(e.touches[0].clientX, e.touches[0].clientY); 
        }, { passive: false });

        // LETTER OVERLAY
        function openLetter() {
            document.getElementById('letter-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('letter-box').classList.add('open'), 10);
        }
        function closeLetter() {
            document.getElementById('letter-box').classList.remove('open');
            setTimeout(() => document.getElementById('letter-overlay').style.display = 'none', 400);
        }

        // FLOATING HEARTS
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerHTML = ['❤️', '💖', '✨', '🌸'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 500);
    </script>
</body>
</html>
